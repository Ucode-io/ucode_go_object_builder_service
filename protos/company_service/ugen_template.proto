syntax="proto3";

package company_service;
option go_package="genproto/company_service";

import "google/protobuf/empty.proto";

service UgenTemplateService {
    rpc Create(CreateUgenTemplateReq) returns (UgenTemplate) {}
    rpc List(GetUgenTemplateListReq) returns (GetUgenTemplateListResponse) {}
    rpc GetById(GetUgenTemplateByIdReq) returns (UgenTemplate) {}
    rpc Update(UpdateUgenTemplateReq) returns (UgenTemplate) {}
    rpc Delete(DeleteUgenTemplateReq) returns (google.protobuf.Empty) {}
}

message CreateUgenTemplateReq {
    string name = 1;
    string description = 2;
    string photo = 3;
    string mcp_project_id = 4;
    int32 order_number = 5;
    string preview_url = 6;
    string source_resource_env_id = 7;
    string source_project_id = 8;
    string source_environment_id = 9;
    string source_node_type = 10;
    string source_mcp_resource_env_id = 11;
    string source_function_id = 12;
    string source_repo_id = 13;
}

message GetUgenTemplateListReq {
    int32 limit = 1;
    int32 offset = 2;
}

message GetUgenTemplateListResponse {
    repeated UgenTemplate templates = 1;
    int32 count = 2;
}

message GetUgenTemplateByIdReq {
    string id = 1;
}

message UpdateUgenTemplateReq {
    string id = 1;
    string name = 2;
    string description = 3;
    string photo = 4;
    string mcp_project_id = 5;
    int32 order_number = 6;
    string preview_url = 7;
    string source_resource_env_id = 8;
    string source_project_id = 9;
    string source_environment_id = 10;
    string source_node_type = 11;
    string source_mcp_resource_env_id = 12;
    string source_function_id = 13;
    string source_repo_id = 14;
}

message DeleteUgenTemplateReq {
    string id = 1;
}

message UgenTemplate {
    string id = 1;
    string name = 2;
    string description = 3;
    string photo = 4;
    string mcp_project_id = 5;
    int32 order_number = 6;
    string created_at = 7;
    string updated_at = 8;
    int64 deleted_at = 9;
    string preview_url = 10;
    string source_resource_env_id = 11;
    string source_project_id = 12;
    string source_environment_id = 13;
    string source_node_type = 14;
    string source_mcp_resource_env_id = 15;
    string source_function_id = 16;
    string source_repo_id = 17;
}
